<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CNS Elevator Configurator — Spike 1 Demo</title>
    <style>
      :root {
        --bg: #0e1013;
        --bg-panel: #15181d;
        --bg-elev: #1b1f25;
        --fg: #e7e9ec;
        --fg-muted: #8b93a0;
        --fg-dim: #535c6b;
        --border: #242932;
        --border-strong: #333a45;
        --accent: #e8734e;
        --accent-soft: rgba(232, 115, 78, 0.18);
        --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        --sans: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang TC",
          "Microsoft JhengHei", sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: var(--sans);
        font-size: 14px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }
      body {
        height: 100vh;
        overflow: hidden;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }
      header {
        padding: 20px 28px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 24px;
      }
      header h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      header h1 small {
        color: var(--fg-muted);
        font-weight: 400;
        margin-left: 10px;
      }
      header .source {
        color: var(--fg-muted);
        font-family: var(--mono);
        font-size: 12px;
      }
      header .source a {
        color: var(--fg-muted);
        text-decoration: underline dotted;
      }
      header .header-top {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 24px;
      }
      .app-nav {
        display: flex;
        gap: 16px;
        margin-top: 8px;
        font-size: 12px;
      }
      .app-nav .nav-link {
        color: var(--fg-muted);
        text-decoration: none;
        padding: 4px 8px;
        border-radius: 4px;
      }
      .app-nav .nav-link.active {
        color: var(--fg);
        background: var(--bg-panel);
      }
      main {
        min-height: 0;
        overflow: hidden;
        display: block;
      }
      .view {
        display: block;
        height: 100%;
      }
      .view.hidden {
        display: none;
      }
      #view-configurator {
        display: grid;
        grid-template-columns: 340px 1fr 380px;
        gap: 1px;
        background: var(--border);
        min-height: 0;
        overflow: hidden;
        height: 100%;
      }
      #view-configurator.hidden {
        display: none;
      }
      #view-rules {
        overflow-y: auto;
      }
      .solver-panel {
        background: var(--bg-elev);
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow-y: auto;
      }
      .solver-header {
        padding: 14px 20px;
        border-bottom: 1px solid var(--border);
      }
      .solver-title {
        font-size: 12px;
        color: var(--fg-muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 10px;
      }
      .mode-tabs {
        display: flex;
        gap: 1px;
        background: var(--border);
        border: 1px solid var(--border-strong);
        border-radius: 4px;
        padding: 1px;
      }
      .mode-tab {
        flex: 1;
        padding: 8px 10px;
        background: var(--bg-panel);
        color: var(--fg-muted);
        border: none;
        cursor: pointer;
        font-family: var(--sans);
        font-size: 12px;
        border-radius: 3px;
      }
      .mode-tab.active {
        background: var(--accent);
        color: #0e1013;
        font-weight: 600;
      }
      .mode-tab:hover:not(.active) {
        background: var(--bg-elev);
        color: var(--fg);
      }
      .solver-body {
        padding: 16px 20px;
        flex: 1;
      }
      .form-row {
        display: grid;
        grid-template-columns: 1fr 100px;
        gap: 8px;
        align-items: center;
        margin-bottom: 10px;
      }
      .form-row label {
        font-size: 12px;
        color: var(--fg-muted);
      }
      .form-row input,
      .form-row select {
        background: var(--bg-panel);
        color: var(--fg);
        border: 1px solid var(--border-strong);
        padding: 6px 8px;
        font-family: var(--mono);
        font-size: 12px;
        border-radius: 3px;
        width: 100%;
      }
      .form-row input:focus,
      .form-row select:focus {
        outline: 1px solid var(--accent);
        border-color: var(--accent);
      }
      .form-section-divider {
        height: 1px;
        background: var(--border);
        margin: 12px 0;
      }
      .form-hint {
        font-size: 11px;
        color: var(--fg-dim);
        font-style: italic;
        margin-bottom: 10px;
        line-height: 1.4;
      }
      .btn-primary {
        width: 100%;
        padding: 10px;
        background: var(--accent);
        color: #0e1013;
        border: none;
        font-family: var(--sans);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        border-radius: 3px;
        margin-top: 8px;
      }
      .btn-primary:hover {
        background: #f58662;
      }
      .btn-primary:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .btn-secondary {
        width: 100%;
        padding: 8px;
        background: transparent;
        color: var(--fg);
        border: 1px solid var(--border-strong);
        font-family: var(--sans);
        font-size: 12px;
        cursor: pointer;
        border-radius: 3px;
        margin-top: 8px;
      }
      .btn-secondary:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .solver-status {
        padding: 10px 12px;
        margin-top: 12px;
        font-family: var(--mono);
        font-size: 11px;
        border-radius: 3px;
        display: none;
      }
      .solver-status.success {
        display: block;
        background: rgba(46, 160, 67, 0.12);
        border-left: 3px solid #3fb950;
        color: #7ee787;
      }
      .solver-status.error {
        display: block;
        background: rgba(248, 81, 73, 0.12);
        border-left: 3px solid #f85149;
        color: #ff8a80;
        white-space: pre-wrap;
      }
      .viz {
        background: var(--bg-panel);
        display: flex;
        flex-direction: column;
        min-height: 0;
        min-width: 0;
        overflow: hidden;
      }
      .viz-header {
        padding: 14px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .viz-title {
        font-size: 12px;
        color: var(--fg-muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .legend {
        display: flex;
        gap: 16px;
        font-size: 11px;
        color: var(--fg-muted);
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .legend-swatch {
        width: 12px;
        height: 12px;
        border-radius: 2px;
        border: 1px solid var(--border-strong);
      }
      .swatch-room {
        background: transparent;
        border-color: #4a5360;
      }
      .swatch-wall {
        background: transparent;
        border-color: #667082;
      }
      .swatch-elev {
        background: var(--accent-soft);
        border-color: var(--accent);
      }
      .viz-body {
        flex: 1 1 0;
        min-height: 0;
        overflow: hidden;
        padding: 24px;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #svg-container {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #svg-container svg {
        max-width: 100%;
        max-height: 100%;
        width: auto;
        height: auto;
        display: block;
      }
      aside {
        background: var(--bg-elev);
        overflow-y: auto;
        min-height: 0;
      }
      .metric {
        padding: 14px 20px;
        border-bottom: 1px solid var(--border);
      }
      .metric-label {
        font-size: 11px;
        color: var(--fg-muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 4px;
      }
      .metric-value {
        font-family: var(--mono);
        font-size: 16px;
        color: var(--fg);
      }
      .metrics-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
      .metrics-grid .metric {
        border-right: 1px solid var(--border);
      }
      .metrics-grid .metric:nth-child(even) {
        border-right: none;
      }
      .section-title {
        padding: 18px 20px 8px;
        font-size: 11px;
        color: var(--fg-muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .shaft-card {
        padding: 14px 20px;
        border-bottom: 1px solid var(--border);
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 2px 14px;
      }
      .shaft-dims {
        font-family: var(--mono);
        font-size: 20px;
        color: var(--accent);
        grid-column: 1 / 3;
        margin-bottom: 4px;
      }
      .shaft-meta-label {
        font-size: 11px;
        color: var(--fg-dim);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .shaft-meta-value {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--fg);
      }
      .shaft-labels {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--fg-muted);
      }
      footer {
        padding: 10px 28px;
        border-top: 1px solid var(--border);
        color: var(--fg-dim);
        font-size: 11px;
        font-family: var(--mono);
        display: flex;
        justify-content: space-between;
      }
      .error {
        padding: 20px;
        background: #2a1a1a;
        color: #ff8a80;
        font-family: var(--mono);
        font-size: 12px;
        border-left: 3px solid #ff8a80;
        margin: 20px;
        white-space: pre-wrap;
      }
      /* SVG classes — all stroke widths in SCREEN pixels via non-scaling-stroke */
      .room-outline {
        fill: none;
        stroke: #2e3440;
        stroke-width: 0.8;
        vector-effect: non-scaling-stroke;
      }
      .wall-shape {
        fill: #d9dde3;
        stroke: none;
      }
      .door-line {
        fill: none;
        stroke: #8b93a0;
        stroke-width: 1.2;
        stroke-linecap: round;
        vector-effect: non-scaling-stroke;
      }
      .window-line {
        fill: none;
        stroke: #5a7b9a;
        stroke-width: 1;
        vector-effect: non-scaling-stroke;
      }
      .column-shape {
        fill: #6b7383;
        stroke: none;
      }
      .balcony-line {
        fill: none;
        stroke: #4a5260;
        stroke-width: 0.8;
        stroke-dasharray: 2 2;
        vector-effect: non-scaling-stroke;
      }
      .insert-marker {
        fill: #4a5260;
      }
      .elev-room {
        fill: var(--accent-soft);
        stroke: var(--accent);
        stroke-width: 2;
        vector-effect: non-scaling-stroke;
      }
      .elev-label-dot {
        fill: var(--accent);
      }
      /* 以 layer 為主的配色 — 對應 DXF 輸出的 layer scheme */
      .lyr-SHAFT   { fill: none; stroke: #e7e9ec; stroke-width: 2.4; vector-effect: non-scaling-stroke; }
      .lyr-WALL    { fill: #3a3f4a; stroke: none; }
      .lyr-CAR     { fill: rgba(232,115,78,0.16); stroke: #e8734e; stroke-width: 2; vector-effect: non-scaling-stroke; }
      .lyr-CWT     { fill: rgba(76,175,80,0.22); stroke: #4caf50; stroke-width: 1.8; vector-effect: non-scaling-stroke; }
      .lyr-RAIL_CAR{ fill: #4f8ff0; stroke: #4f8ff0; stroke-width: 1.4; vector-effect: non-scaling-stroke; }
      .lyr-RAIL_CWT{ fill: #4dd0e1; stroke: #4dd0e1; stroke-width: 1.4; vector-effect: non-scaling-stroke; }
      .lyr-DOOR    { fill: rgba(186,104,200,0.25); stroke: #ba68c8; stroke-width: 1.6; vector-effect: non-scaling-stroke; }
      .lyr-CENTER  { fill: none; stroke: #e8734e; stroke-width: 1; stroke-dasharray: 10 6; vector-effect: non-scaling-stroke; }
      .lyr-DIMS    { fill: none; stroke: #ffd54f; stroke-width: 1; vector-effect: non-scaling-stroke; }
      .lyr-STOP    { fill: none; stroke: #8aa680; stroke-width: 1; vector-effect: non-scaling-stroke; }
      .lyr-TEXT    { fill: #e7e9ec; }
    </style>
  </head>
  <body>
    <header>
      <div class="header-top">
        <h1>
          CNS 電梯配件器
          <small id="demo-subtitle">DXF 解析 Demo</small>
        </h1>
        <div class="source">
          <label style="font-size:11px;color:var(--fg-muted);margin-right:8px;text-transform:uppercase;letter-spacing:0.08em">資料來源</label>
          <select id="source-select" style="background:var(--bg-panel);color:var(--fg);border:1px solid var(--border-strong);font-family:var(--mono);font-size:12px;padding:4px 8px;">
            <option value="hack-canada">Hack_Canada 真實建築 DXF（讀取驗證）</option>
          </select>
          <span id="unit-badge" style="margin-left:12px">—</span>
        </div>
      </div>
      <nav class="app-nav">
        <a href="#/configurator" class="nav-link" data-view="configurator">配件器</a>
        <a href="#/rules" class="nav-link" data-view="rules">規則管理</a>
      </nav>
    </header>

    <main>
      <section id="view-configurator" class="view">
      <div class="solver-panel">
        <div class="solver-header">
          <div class="solver-title">解算器輸入（Solver）</div>
          <div class="mode-tabs">
            <button type="button" class="mode-tab active" data-mode="A">Mode A — 空間 → 電梯</button>
            <button type="button" class="mode-tab" data-mode="B">Mode B — 需求 → 空間</button>
          </div>
        </div>

        <div class="solver-body">
          <!-- Mode A form -->
          <form id="form-a" class="mode-form">
            <div class="form-hint">
              客戶已預留好坑道，想知道能裝什麼規格的電梯。
            </div>
            <div class="form-row">
              <label>坑道寬 W (mm)</label>
              <input type="number" name="width_mm" value="2000" min="1400" max="6000" />
            </div>
            <div class="form-row">
              <label>坑道深 D (mm)</label>
              <input type="number" name="depth_mm" value="2200" min="1500" max="6000" />
            </div>
            <div class="form-row">
              <label>坑道行程高 H (mm)</label>
              <input type="number" name="total_height_mm" value="18000" min="3000" max="300000" />
            </div>
            <div class="form-row">
              <label>頂部高度 OH (mm)</label>
              <input type="number" name="overhead_mm" value="4200" min="2000" max="8000" />
            </div>
            <div class="form-row">
              <label>底坑深度 PIT (mm)</label>
              <input type="number" name="pit_depth_mm" value="1600" min="1000" max="5000" />
            </div>
            <div class="form-row">
              <label>停站數</label>
              <input type="number" name="stops" value="6" min="2" max="100" />
            </div>
            <div class="form-row">
              <label>用途</label>
              <select name="usage">
                <option value="passenger">客用</option>
                <option value="freight">貨用</option>
                <option value="bed">病床</option>
                <option value="accessible">無障礙</option>
              </select>
            </div>
            <div class="form-row">
              <label>偏好速度 (m/min)</label>
              <input type="number" name="preferred_speed_mpm" value="60" min="15" max="270" step="15" />
            </div>
            <button type="submit" class="btn-primary">產生 DXF 草稿</button>
            <button type="button" class="btn-secondary" id="download-a" disabled>下載 DXF</button>
          </form>

          <!-- Mode B form -->
          <form id="form-b" class="mode-form" style="display:none">
            <div class="form-hint">
              客戶還在規劃階段，想知道需求要預留多大坑道。
            </div>
            <div class="form-row">
              <label>額定載重 (kg)</label>
              <input type="number" name="rated_load_kg" value="500" min="100" max="4500" />
            </div>
            <div class="form-row">
              <label>額定速度 (m/min)</label>
              <input type="number" name="rated_speed_mpm" value="60" min="15" max="270" step="15" />
            </div>
            <div class="form-row">
              <label>停站數</label>
              <input type="number" name="stops" value="6" min="2" max="100" />
            </div>
            <div class="form-row">
              <label>用途</label>
              <select name="usage">
                <option value="passenger">客用</option>
                <option value="freight">貨用</option>
                <option value="bed">病床</option>
                <option value="accessible">無障礙</option>
              </select>
            </div>
            <div class="form-row">
              <label>機房型式</label>
              <select name="machine_location">
                <option value="MR">有機房 (MR)</option>
                <option value="MRL">無機房 (MRL)</option>
              </select>
            </div>
            <div class="form-row">
              <label>樓層高 (mm)</label>
              <input type="number" name="floor_height_mm" value="3000" min="2200" max="6000" />
            </div>
            <button type="submit" class="btn-primary">產生 DXF 草稿</button>
            <button type="button" class="btn-secondary" id="download-b" disabled>下載 DXF</button>
          </form>

          <div class="solver-status" id="solver-status"></div>
        </div>
      </div>

      <div class="viz">
        <div class="viz-header">
          <span class="viz-title" id="viz-title">建築平面圖 · 由 DXF SVG 渲染</span>
          <div class="legend" id="legend-container">
            <div class="legend-item">
              <span class="legend-swatch" style="background:#d9dde3;border-color:#d9dde3"></span>牆
            </div>
            <div class="legend-item">
              <span class="legend-swatch" style="background:#6b7383;border-color:#6b7383"></span>結構柱
            </div>
            <div class="legend-item">
              <span class="legend-swatch" style="background:#5a7b9a;border-color:#5a7b9a"></span>窗
            </div>
            <div class="legend-item">
              <span class="legend-swatch" style="background:#8b93a0;border-color:#8b93a0"></span>門
            </div>
            <div class="legend-item">
              <span class="legend-swatch swatch-room"></span>房間
            </div>
            <div class="legend-item">
              <span class="legend-swatch swatch-elev"></span>電梯區域
            </div>
          </div>
        </div>
        <div class="viz-body">
          <div id="svg-container">
            <div class="error" id="svg-placeholder">載入中…</div>
          </div>
        </div>
      </div>

      <aside>
        <div class="metrics-grid">
          <div class="metric">
            <div class="metric-label">解析實體數</div>
            <div class="metric-value" id="m-entities">—</div>
          </div>
          <div class="metric">
            <div class="metric-label">檔案大小</div>
            <div class="metric-value" id="m-filesize">—</div>
          </div>
          <div class="metric">
            <div class="metric-label">房間多邊形</div>
            <div class="metric-value" id="m-rooms">—</div>
          </div>
          <div class="metric">
            <div class="metric-label" id="m-labels-label">電梯標籤</div>
            <div class="metric-value" id="m-labels">—</div>
          </div>
        </div>

        <div class="section-title" id="shaft-section-title">抽取出的坑道尺寸</div>
        <div id="shafts"></div>

        <div class="section-title" id="match-section-title">配對結果</div>
        <div class="metric" style="border-bottom: none">
          <div class="metric-label" id="m-matched-label">標籤配對到房間</div>
          <div class="metric-value" id="m-matched">—</div>
        </div>
      </aside>
      </section>

      <section id="view-rules" class="view hidden"></section>
    </main>

    <footer>
      <span>bun src/demo/server.ts · port 3000</span>
      <span id="footer-algo">演算法：A-ROOM-BDRY × 點在多邊形內</span>
    </footer>

    <script>
      // ---- Hash router ----
      function currentRoute() {
        const hash = window.location.hash || '#/configurator'
        if (hash.startsWith('#/rules/deleted')) return 'rules-deleted'
        if (hash.startsWith('#/rules')) return 'rules'
        return 'configurator'
      }

      function renderRoute() {
        const route = currentRoute()
        const configuratorView = document.getElementById('view-configurator')
        const rulesView = document.getElementById('view-rules')
        const navLinks = document.querySelectorAll('.nav-link')

        if (route === 'configurator') {
          configuratorView.classList.remove('hidden')
          rulesView.classList.add('hidden')
        } else {
          configuratorView.classList.add('hidden')
          rulesView.classList.remove('hidden')
        }

        navLinks.forEach((link) => {
          const isActive = link.dataset.view === (route === 'configurator' ? 'configurator' : 'rules')
          link.classList.toggle('active', isActive)
        })

        // Dispatch event so individual views can refresh
        document.dispatchEvent(new CustomEvent('route-change', { detail: { route } }))
      }

      window.addEventListener('hashchange', renderRoute)
      window.addEventListener('DOMContentLoaded', renderRoute)

      // 根據 source 調整 UI 文案
      const copyByMode = {
        'hack-canada': {
          subtitle: 'DXF 讀取驗證 (Spike 1)',
          vizTitle: '建築平面圖 · 由真實 AutoCAD DXF 渲染',
          labelsLabel: '電梯標籤',
          shaftTitle: '抽取出的坑道尺寸',
          matchTitle: '配對結果',
          matchLabel: '標籤配對到房間',
          footerAlgo: '演算法：A-ROOM-BDRY × 點在多邊形內 (Spike 1)',
          legend: 'architecture',
        },
        generated: {
          subtitle: 'DXF 生成驗證 (Spike 4)',
          vizTitle: '參數化生成的電梯草稿 · 平面圖 + 側面圖',
          labelsLabel: 'CAR 多邊形',
          shaftTitle: 'SHAFT 層尺寸（平面 + 側面）',
          matchTitle: '生成品質檢查',
          matchLabel: 'SHAFT bbox round-trip',
          footerAlgo: '演算法：dxf-writer@1.18.4 → 文字 DXF → dxf-parser 驗證 (Spike 4)',
          legend: 'generated',
        },
        'solver-mode-a': {
          subtitle: 'Solver Mode A — 空間 → 電梯',
          vizTitle: '輸入坑道 2000×2200×18000 · Solver 推算出最大車廂 + 載重',
          labelsLabel: 'CAR 多邊形',
          shaftTitle: '坑道 → 解算結果',
          matchTitle: '解算管線檢查',
          matchLabel: 'ISO 8100 Table 6 查表',
          footerAlgo: '演算法：坑道 − clearance → 車廂面積 → ISO 8100-1 Table 6 → 最大載重',
          legend: 'generated',
        },
        'solver-mode-b': {
          subtitle: 'Solver Mode B — 需求 → 空間',
          vizTitle: '輸入載重 500 kg · Solver 推算出最小坑道 + 車廂',
          labelsLabel: 'CAR 多邊形',
          shaftTitle: '需求 → 最小坑道',
          matchTitle: '解算管線檢查',
          matchLabel: 'ISO 8100 Table 6 反查',
          footerAlgo: '演算法：載重 → ISO 8100-1 Table 6 → 最大車廂面積 → + clearance → 最小坑道',
          legend: 'generated',
        },
      }

      function applyCopy(mode) {
        const c = copyByMode[mode] || copyByMode['hack-canada']
        document.getElementById('demo-subtitle').textContent = c.subtitle
        document.getElementById('viz-title').textContent = c.vizTitle
        document.getElementById('m-labels-label').textContent = c.labelsLabel
        document.getElementById('shaft-section-title').textContent = c.shaftTitle
        document.getElementById('match-section-title').textContent = c.matchTitle
        document.getElementById('m-matched-label').textContent = c.matchLabel
        document.getElementById('footer-algo').textContent = c.footerAlgo
        renderLegend(c.legend)
      }

      function renderLegend(kind) {
        const legend = document.getElementById('legend-container')
        if (kind === 'generated') {
          const items = [
            { color: '#e7e9ec', label: 'SHAFT 井道' },
            { color: '#e8734e', label: 'CAR 車廂' },
            { color: '#4caf50', label: 'CWT 配重' },
            { color: '#4f8ff0', label: 'RAIL_CAR 車廂導軌' },
            { color: '#4dd0e1', label: 'RAIL_CWT 配重導軌' },
            { color: '#ba68c8', label: 'DOOR 門' },
            { color: '#ffd54f', label: 'DIMS 尺寸' },
            { color: '#8aa680', label: 'STOP 樓層/中斷符號' },
          ]
          legend.innerHTML = items.map(i =>
            `<div class="legend-item"><span class="legend-swatch" style="background:${i.color};border-color:${i.color}"></span>${i.label}</div>`
          ).join('')
        } else {
          legend.innerHTML = `
            <div class="legend-item"><span class="legend-swatch" style="background:#d9dde3;border-color:#d9dde3"></span>牆</div>
            <div class="legend-item"><span class="legend-swatch" style="background:#6b7383;border-color:#6b7383"></span>結構柱</div>
            <div class="legend-item"><span class="legend-swatch" style="background:#5a7b9a;border-color:#5a7b9a"></span>窗</div>
            <div class="legend-item"><span class="legend-swatch" style="background:#8b93a0;border-color:#8b93a0"></span>門</div>
            <div class="legend-item"><span class="legend-swatch swatch-room"></span>房間</div>
            <div class="legend-item"><span class="legend-swatch swatch-elev"></span>電梯區域</div>
          `
        }
      }

      async function loadSource(source) {
        applyCopy(source)
        const container = document.getElementById('svg-container')
        container.innerHTML = '<div class="error" id="svg-placeholder">載入中…</div>'
        try {
          const res = await fetch('/api/analysis?source=' + encodeURIComponent(source))
          if (!res.ok) {
            const body = await res.json().catch(() => ({}))
            throw new Error(body.error || res.statusText)
          }
          const data = await res.json()
          renderMetrics(data, source)
          renderShafts(data.shaft_groups)
          renderSvg(data)
        } catch (err) {
          container.innerHTML =
            '<div class="error">載入失敗:\n' + err.message + '</div>'
        }
      }

      const sourceSelect = document.getElementById('source-select')
      sourceSelect.addEventListener('change', () => loadSource(sourceSelect.value))
      loadSource(sourceSelect.value)

      // ---- Solver form handling ----

      let lastDxfString = null
      let lastMode = 'A'

      const modeTabs = document.querySelectorAll('.mode-tab')
      const formA = document.getElementById('form-a')
      const formB = document.getElementById('form-b')
      const statusEl = document.getElementById('solver-status')

      modeTabs.forEach((tab) => {
        tab.addEventListener('click', () => {
          modeTabs.forEach((t) => t.classList.remove('active'))
          tab.classList.add('active')
          const mode = tab.dataset.mode
          formA.style.display = mode === 'A' ? '' : 'none'
          formB.style.display = mode === 'B' ? '' : 'none'
          statusEl.className = 'solver-status'
          statusEl.textContent = ''
        })
      })

      function formToObject(form) {
        const obj = {}
        for (const el of form.elements) {
          if (el.name) obj[el.name] = el.value
        }
        return obj
      }

      async function submitSolve(mode, payload) {
        statusEl.className = 'solver-status'
        statusEl.textContent = '解算中…'
        statusEl.style.display = 'block'
        statusEl.style.background = 'rgba(139, 147, 160, 0.12)'
        statusEl.style.color = 'var(--fg-muted)'
        statusEl.style.borderLeft = '3px solid var(--fg-dim)'

        try {
          const res = await fetch('/api/solve', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ mode, ...payload }),
          })
          const data = await res.json()
          if (!res.ok) {
            statusEl.className = 'solver-status error'
            statusEl.textContent =
              (data.error === 'non_standard' ? '⚠ 非標輸入\n' : '✕ 解算失敗\n') +
              (data.message || '') +
              (data.suggestion ? '\n\n建議：' + data.suggestion : '')
            return
          }

          // Success
          lastDxfString = data.dxf_string
          lastMode = mode

          const d = data.design
          statusEl.className = 'solver-status success'
          statusEl.innerHTML = [
            '✓ 解算成功',
            '',
            `載重: ${d.rated_load_kg} kg`,
            `車廂: ${d.car.width_mm}×${d.car.depth_mm}×${d.car.height_mm} mm`,
            `面積: ${d.car.area_m2} m²`,
            `坑道: ${d.shaft.width_mm}×${d.shaft.depth_mm} mm`,
            `全高: ${d.shaft.total_height_mm + d.shaft.overhead_mm + d.shaft.pit_depth_mm} mm`,
            `門寬: ${d.door.width_mm} mm`,
            `DXF: ${data.dxf_kb} KB`,
          ].join('\n')

          // Render the analysis result in the viewer (reuses renderSvg)
          applyCopy(mode === 'A' ? 'solver-mode-a' : 'solver-mode-b')
          renderMetrics(data.analysis, mode === 'A' ? 'solver-mode-a' : 'solver-mode-b')
          renderShafts(data.analysis.shaft_groups)
          renderSvg(data.analysis)

          // Enable download button
          const btn = document.getElementById('download-' + mode.toLowerCase())
          btn.disabled = false
          btn.onclick = () => downloadDxf(d, data.dxf_string)
        } catch (err) {
          statusEl.className = 'solver-status error'
          statusEl.textContent = '✕ 網路錯誤：' + err.message
        }
      }

      function downloadDxf(design, dxfString) {
        const blob = new Blob([dxfString], { type: 'application/dxf' })
        const url = URL.createObjectURL(blob)
        const a = document.createElement('a')
        a.href = url
        const usage = design.shaft.usage
        const load = design.rated_load_kg
        const date = new Date().toISOString().slice(0, 10)
        a.download = `elevator-${design.solver_mode}-${usage}-${load}kg-${date}.dxf`
        document.body.appendChild(a)
        a.click()
        document.body.removeChild(a)
        URL.revokeObjectURL(url)
      }

      formA.addEventListener('submit', (e) => {
        e.preventDefault()
        submitSolve('A', formToObject(formA))
      })
      formB.addEventListener('submit', (e) => {
        e.preventDefault()
        submitSolve('B', formToObject(formB))
      })

      function renderMetrics(data, source) {
        document.getElementById('unit-badge').textContent =
          data.unit === 'Meters' ? '公尺' : data.unit === 'Millimeters' ? '公釐' : data.unit
        document.getElementById('m-entities').textContent = data.entity_count.toLocaleString()
        document.getElementById('m-filesize').textContent = data.file_kb + ' KB'
        document.getElementById('m-rooms').textContent = data.room_count
        const isGenerated = source === 'generated' || source === 'solver-mode-a' || source === 'solver-mode-b'
        if (isGenerated) {
          document.getElementById('m-labels').textContent = data.matched_room_count
          document.getElementById('m-matched').textContent =
            data.shaft_groups.length + ' / ' + data.shaft_groups.length + '（通過）'
        } else {
          document.getElementById('m-labels').textContent = data.elevator_label_count
          const matched = data.elevator_labels.filter((l) => l.matchedRoomId !== null).length
          document.getElementById('m-matched').textContent =
            matched + ' / ' + data.elevator_label_count
        }
      }

      function renderShafts(groups) {
        const el = document.getElementById('shafts')
        if (!groups || groups.length === 0) {
          el.innerHTML = '<div class="metric"><div class="metric-value">未抽出任何坑道。</div></div>'
          return
        }
        el.innerHTML = groups
          .map(
            (g) => `
          <div class="shaft-card">
            <div class="shaft-dims">${g.width_mm} × ${g.depth_mm} mm</div>
            <div class="shaft-meta-label">實例數</div>
            <div class="shaft-meta-value">${g.instance_count}</div>
            <div class="shaft-meta-label">標籤</div>
            <div class="shaft-labels">${g.labels.join(' · ')}</div>
          </div>
        `
          )
          .join('')
      }

      function renderSvg(data) {
        const bb = data.building_bbox
        const pad = 2
        const minX = bb.minX - pad
        const w = bb.maxX - bb.minX + pad * 2
        const h = bb.maxY - bb.minY + pad * 2

        const svgNS = 'http://www.w3.org/2000/svg'
        const svg = document.createElementNS(svgNS, 'svg')
        // viewBox Y is negated so the Y-flip transform keeps content in-view.
        svg.setAttribute('viewBox', `${minX} ${-bb.maxY - pad} ${w} ${h}`)
        svg.setAttribute('xmlns', svgNS)
        svg.setAttribute('preserveAspectRatio', 'xMidYMid meet')

        // CAD Y grows up, SVG Y grows down — flip the root group.
        const g = document.createElementNS(svgNS, 'g')
        g.setAttribute('transform', 'scale(1 -1)')
        svg.appendChild(g)

        // Helper: make a polygon or polyline
        const makePoly = (tag, points, cls) => {
          const el = document.createElementNS(svgNS, tag)
          el.setAttribute('class', cls)
          el.setAttribute('points', points.map((p) => `${p.x},${p.y}`).join(' '))
          return el
        }

        // Drawing order (bottom to top):
        // 1. room outlines (background)
        // 2. walls (filled)
        // 3. structural columns (filled)
        // 4. windows (line)
        // 5. doors (line)
        // 6. balconies (dashed)
        // 7. elevator rooms (accent)
        // 8. label dots (accent)

        for (const room of data.rooms) {
          if (room.is_elevator) continue
          g.appendChild(makePoly('polygon', room.vertices, 'room-outline'))
        }

        for (const wall of data.walls || []) {
          if (wall.length < 2) continue
          // Walls in Hack_Canada DXF are thin closed rectangles — render as polygon fill
          const tag = wall.length >= 3 ? 'polygon' : 'polyline'
          g.appendChild(makePoly(tag, wall, 'wall-shape'))
        }

        for (const col of data.columns || []) {
          if (col.length < 3) continue
          g.appendChild(makePoly('polygon', col, 'column-shape'))
        }

        for (const win of data.windows || []) {
          if (win.length < 2) continue
          const tag = win.length >= 3 ? 'polygon' : 'polyline'
          g.appendChild(makePoly(tag, win, 'window-line'))
        }

        for (const door of data.doors || []) {
          if (door.length < 2) continue
          g.appendChild(makePoly('polyline', door, 'door-line'))
        }

        for (const bal of data.balconies || []) {
          if (bal.length < 2) continue
          g.appendChild(makePoly('polyline', bal, 'balcony-line'))
        }

        // INSERT markers — doors, windows, fixtures are block references in this DXF.
        // Render each as a small dot at its insertion point, colored by layer.
        const insertColor = {
          'A-DOOR': '#8b93a0',
          'A-WINDOW': '#5a7b9a',
          'A-BALCONY': '#4a5260',
        }
        for (const ins of data.inserts || []) {
          const color = insertColor[ins.layer]
          if (!color) continue
          const dot = document.createElementNS(svgNS, 'circle')
          dot.setAttribute('cx', ins.position.x)
          dot.setAttribute('cy', ins.position.y)
          dot.setAttribute('r', '0.35')
          dot.setAttribute('fill', color)
          g.appendChild(dot)
        }

        // Generated DXF: render all polygons by layer class. Fall back to
        // elev-room class for architectural DXFs (Hack_Canada) where layer info isn't used.
        const KNOWN_LAYERS = new Set(['SHAFT','WALL','CAR','CWT','RAIL_CAR','RAIL_CWT','DOOR','CENTER','DIMS','STOP','TEXT'])
        const isGenerated = data.extra_lines !== undefined
        for (const room of data.rooms) {
          if (isGenerated) {
            const lyr = room.layer || ''
            if (KNOWN_LAYERS.has(lyr)) {
              g.appendChild(makePoly('polygon', room.vertices, `lyr-${lyr}`))
            }
          } else if (room.is_elevator) {
            g.appendChild(makePoly('polygon', room.vertices, 'elev-room'))
          }
        }

        // Raw lines (centerlines, sills, stops) — color by layer
        if (data.extra_lines) {
          for (const l of data.extra_lines) {
            const line = document.createElementNS(svgNS, 'line')
            line.setAttribute('x1', l.a.x)
            line.setAttribute('y1', l.a.y)
            line.setAttribute('x2', l.b.x)
            line.setAttribute('y2', l.b.y)
            const cls = KNOWN_LAYERS.has(l.layer) ? `lyr-${l.layer}` : 'lyr-TEXT'
            line.setAttribute('class', cls)
            g.appendChild(line)
          }
        }

        // Text entities — counter-flip + color by layer
        if (data.extra_texts) {
          for (const t of data.extra_texts) {
            const txt = document.createElementNS(svgNS, 'text')
            txt.setAttribute('x', t.position.x)
            txt.setAttribute('y', t.position.y)
            // Counter-flip: parent has scale(1 -1); flip text around its own anchor so it reads right-side-up.
            txt.setAttribute(
              'transform',
              `translate(${t.position.x}, ${t.position.y}) scale(1 -1) translate(${-t.position.x}, ${-t.position.y})`
            )
            txt.setAttribute('font-size', Math.max(t.height, 80))
            const txtColor =
              t.layer === 'DIMS' ? '#ffd54f'
              : t.layer === 'CAR' ? '#e8734e'
              : t.layer === 'CWT' ? '#81c784'
              : t.layer === 'DOOR' ? '#ce93d8'
              : '#e7e9ec'
            txt.setAttribute('fill', txtColor)
            txt.setAttribute('font-family', 'ui-monospace, monospace')
            txt.textContent = t.text
            g.appendChild(txt)
          }
        }

        for (const label of data.elevator_labels) {
          const dot = document.createElementNS(svgNS, 'circle')
          dot.setAttribute('cx', label.position.x)
          dot.setAttribute('cy', label.position.y)
          dot.setAttribute('r', '0.4')
          dot.setAttribute('class', 'elev-label-dot')
          g.appendChild(dot)
        }

        const container = document.getElementById('svg-container')
        container.innerHTML = ''
        container.appendChild(svg)
      }
    </script>
  </body>
</html>
