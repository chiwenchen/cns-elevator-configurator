name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Test
        run: bun test
      - name: Inject version into HTML from latest merged PR number
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUM=$(gh pr list --state merged --limit 1 --json number --jq '.[0].number')
          VERSION="v.$(printf '%03d' "$PR_NUM")"
          echo "Injecting version: $VERSION"
          sed -i 's|data-ci="app-version-placeholder">dev</span|data-ci="app-version-placeholder">'"$VERSION"'</span|' public/index.html
          grep 'app-version-placeholder' public/index.html
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
